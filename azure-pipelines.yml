trigger:
  branches:
    include:
      - dev
      - main

pool:
  vmImage: ubuntu-latest

steps:

# 1. Verificar entorno (Node ya viene instalado en ubuntu-latest)
- script: |
    node -v
    npm -v
  displayName: 'Verificar Node y NPM'

# 2. Instalar dependencias (modo CI recomendado)
- script: |
    npm ci
  displayName: 'Instalar dependencias (npm ci)'

# 3. Ejecutar pruebas unitarias
- script: |
    npm test
  displayName: 'Ejecutar pruebas unitarias'

# 4. Seguridad básica (OWASP nivel npm)
- script: |
    npm audit --audit-level=high
  displayName: 'Escaneo de seguridad npm audit'
