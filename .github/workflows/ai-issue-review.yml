name: AI Issue Review

on:
  issues:
    types:
      - opened

permissions:
  contents: read
  issues: write

jobs:
  analyze-issue:
    runs-on: ubuntu-latest

    steps:

      - name: Analizar Issue
        id: api
        shell: bash
        run: |

          RESPONSE=$(curl --fail --silent --show-error \
            --max-time 60 \
            -X POST \
            "https://plan-desarrollo-cmr.onrender.com/api/github/issue-review" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg title "${{ github.event.issue.title }}" \
              --arg body "${{ github.event.issue.body }}" \
              '{title:$title, body:$body}')")

          echo "$RESPONSE"

          RESULT=$(echo "$RESPONSE" | jq -r '.response // empty')

          if [ -z "$RESULT" ]; then
            echo "La API no devolvió una respuesta válida."
            exit 1
          fi

          {
            echo "response<<EOF"
            echo "$RESULT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publicar comentario
        uses: actions/github-script@v7
        env:
          RESPONSE: ${{ steps.api.outputs.response }}
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: process.env.RESPONSE
            });