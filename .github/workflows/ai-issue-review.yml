name: AI Issue Review

on:
  issues:
    types:
      - opened

permissions:
  contents: read
  issues: write
  models: read

jobs:
  analyze-issue:
    runs-on: ubuntu-latest

    steps:
      - name: Generar análisis con GitHub Models
        id: inference
        uses: actions/ai-inference@v1
        with:
          model: openai/gpt-4o
          system-prompt: |
            Eres un desarrollador Senior experto en Node.js, Express,
            pruebas unitarias, CI/CD, Azure Pipelines y seguridad OWASP.

            Siempre responde en español utilizando Markdown.

          prompt: |
            Analiza el siguiente Issue de GitHub.

            ## Título
            ${{ github.event.issue.title }}

            ## Descripción
            ${{ github.event.issue.body }}

            Genera la respuesta con el siguiente formato:

            ## 📋 Resumen

            ## 🔍 Posibles causas

            ## 🛠️ Propuesta de solución

            ## 🧪 Pruebas unitarias sugeridas

            ## ⚠️ Riesgos o consideraciones

      - name: Publicar comentario
        uses: actions/github-script@v7
        env:
          RESPONSE: ${{ steps.inference.outputs.response }}
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🤖 Análisis generado por GitHub Models

${process.env.RESPONSE}`
            });
