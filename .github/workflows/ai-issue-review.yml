name: AI Issue Review

on:
  issues:
    types: [opened]

permissions:
  issues: write
  contents: read

jobs:
  analyze-issue:
    runs-on: ubuntu-latest

    steps:
      - name: Analizar issue con GitHub Models
        uses: actions/github-script@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            const issue = context.payload.issue;

            const prompt = `
            Eres un asistente experto en desarrollo de software.

            Analiza el siguiente Issue de GitHub:

            Título:
            ${issue.title}

            Descripción:
            ${issue.body}

            Genera una respuesta con:

            1. Resumen del problema.
            2. Posibles causas.
            3. Propuesta de solución.
            4. Pruebas unitarias recomendadas.
            5. Riesgos o puntos a revisar.

            Responde en español y con formato Markdown.
            `;

            const response = await fetch(
              "https://models.github.ai/inference/chat/completions",
              {
                method: "POST",
                headers: {
                  "Authorization": `Bearer ${process.env.GITHUB_TOKEN}`,
                  "Content-Type": "application/json"
                },
                body: JSON.stringify({
                  model: "openai/gpt-4o-mini",
                  messages: [
                    {
                      role: "user",
                      content: prompt
                    }
                  ],
                  temperature: 0.3
                })
              }
            );

            const data = await response.json();

            const answer =
              data.choices[0].message.content;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: `## 🤖 Análisis generado por IA\n\n${answer}`
            });